<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TaskFlow</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <!-- Logo -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="auth-logo">✅</div>
      <div>
        <div class="fw-800 fs-5" style="font-weight:800;color:#0F172A;">TaskFlow</div>
        <div class="text-muted" style="font-size:.75rem;">Manage your tasks effortlessly</div>
      </div>
    </div>

    <h2 class="mb-1">Welcome back</h2>
    <p class="text-muted mb-4" style="font-size:.875rem;">Sign in to your workspace</p>

    <!-- Alert -->
    <div id="loginAlert" class="alert alert-danger d-none py-2 px-3" style="font-size:.85rem;border-radius:10px;" role="alert">
      <i class="bi bi-exclamation-circle me-2"></i><span id="loginAlertMsg"></span>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="loginEmail" class="form-label">Email address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required />
      </div>

      <div class="mb-4">
        <label for="loginPassword" class="form-label">Password</label>
        <div class="position-relative">
          <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required />
          <button type="button" id="togglePwd" class="btn position-absolute end-0 top-50 translate-middle-y me-1 p-1 border-0 text-muted">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" id="loginBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="text-center mb-0" style="font-size:.875rem;">
      Don't have an account? <a href="register.html" class="auth-link">Create one →</a>
    </p>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { loginUser, redirectIfLoggedIn } from "./script.js";

    // Redirect if already logged in
    redirectIfLoggedIn();

    // Password toggle
    document.getElementById("togglePwd").addEventListener("click", () => {
      const inp = document.getElementById("loginPassword");
      const ico = document.querySelector("#togglePwd i");
      if (inp.type === "password") { inp.type = "text";  ico.className = "bi bi-eye-slash"; }
      else                         { inp.type = "password"; ico.className = "bi bi-eye"; }
    });

    // Form submit
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn   = document.getElementById("loginBtn");
      const alert = document.getElementById("loginAlert");
      const msg   = document.getElementById("loginAlertMsg");
      alert.classList.add("d-none");

      const email = document.getElementById("loginEmail").value.trim();
      const pwd   = document.getElementById("loginPassword").value;

      if (!email || !pwd) {
        msg.textContent = "Please fill in all fields.";
        alert.classList.remove("d-none"); return;
      }

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Signing in…`;

      try {
        await loginUser(email, pwd);
        window.location.href = "dashboard.html";
      } catch (err) {
        const map = {
          "auth/invalid-credential": "Incorrect email or password.",
          "auth/user-not-found":     "No account found with this email.",
          "auth/wrong-password":     "Incorrect password.",
          "auth/too-many-requests":  "Too many attempts. Try again later.",
          "auth/invalid-email":      "Please enter a valid email address."
        };
        msg.textContent = map[err.code] || "Sign-in failed. Please try again.";
        alert.classList.remove("d-none");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="bi bi-box-arrow-in-right me-2"></i>Sign In`;
      }
    });
  </script>
</body>
</html>
