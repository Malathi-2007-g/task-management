<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Modern Task Management</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display:grid; place-items:center; min-height:100vh;
           background:linear-gradient(135deg,#0F172A,#312E81,#4C1D95); }
    .loader { text-align:center; color:#fff; }
    .loader-ring {
      width:48px;height:48px;border-radius:50%;
      border:4px solid rgba(255,255,255,.2);
      border-top-color:#fff;
      animation:spin .8s linear infinite; margin:0 auto 16px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div class="loader">
    <div class="loader-ring"></div>
    <p style="font-size:.9rem;opacity:.7">Loading TaskFlow…</p>
  </div>

  <script type="module">
    import { auth } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    onAuthStateChanged(auth, (user) => {
      window.location.href = user ? "dashboard.html" : "login.html";
    });
  </script>
</body>
</html>
