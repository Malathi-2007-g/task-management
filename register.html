<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — TaskFlow</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <!-- Logo -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="auth-logo">✅</div>
      <div>
        <div class="fw-800 fs-5" style="font-weight:800;color:#0F172A;">TaskFlow</div>
        <div class="text-muted" style="font-size:.75rem;">Your productivity partner</div>
      </div>
    </div>

    <h2 class="mb-1">Create account</h2>
    <p class="text-muted mb-4" style="font-size:.875rem;">Get started — it's free</p>

    <!-- Alert -->
    <div id="regAlert" class="alert alert-danger d-none py-2 px-3" style="font-size:.85rem;border-radius:10px;" role="alert">
      <i class="bi bi-exclamation-circle me-2"></i><span id="regAlertMsg"></span>
    </div>

    <!-- Form -->
    <form id="registerForm" novalidate>
      <div class="mb-3">
        <label for="regName" class="form-label">Full Name</label>
        <input type="text" id="regName" class="form-control" placeholder="Malarvizhi S" required />
      </div>

      <div class="mb-3">
        <label for="regEmail" class="form-label">Email address</label>
        <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required />
      </div>

      <div class="mb-3">
        <label for="regPassword" class="form-label">Password</label>
        <div class="position-relative">
          <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters" required minlength="6" />
          <button type="button" id="togglePwd" class="btn position-absolute end-0 top-50 translate-middle-y me-1 p-1 border-0 text-muted">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <!-- Strength indicator -->
        <div class="progress mt-2" style="height:4px;">
          <div id="pwdStrengthBar" class="progress-bar" style="width:0;transition:width .3s,background .3s;"></div>
        </div>
        <div id="pwdStrengthLabel" class="text-muted mt-1" style="font-size:.72rem;"></div>
      </div>

      <div class="mb-4">
        <label for="regConfirm" class="form-label">Confirm Password</label>
        <input type="password" id="regConfirm" class="form-control" placeholder="Repeat password" required />
      </div>

      <button type="submit" class="btn btn-primary w-100" id="regBtn">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="text-center mb-0" style="font-size:.875rem;">
      Already have an account? <a href="login.html" class="auth-link">Sign in →</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { registerUser, redirectIfLoggedIn } from "./script.js";

    redirectIfLoggedIn();

    // Password toggle
    document.getElementById("togglePwd").addEventListener("click", () => {
      const inp = document.getElementById("regPassword");
      const ico = document.querySelector("#togglePwd i");
      if (inp.type === "password") { inp.type = "text";  ico.className = "bi bi-eye-slash"; }
      else                         { inp.type = "password"; ico.className = "bi bi-eye"; }
    });

    // Password strength meter
    document.getElementById("regPassword").addEventListener("input", function () {
      const val = this.value;
      const bar = document.getElementById("pwdStrengthBar");
      const lbl = document.getElementById("pwdStrengthLabel");
      let score = 0;
      if (val.length >= 6)                  score++;
      if (/[A-Z]/.test(val))               score++;
      if (/[0-9]/.test(val))               score++;
      if (/[^A-Za-z0-9]/.test(val))        score++;
      const map = [
        { w:"0%",   bg:"#E2E8F0", t:"" },
        { w:"25%",  bg:"#EF4444", t:"Weak" },
        { w:"50%",  bg:"#F59E0B", t:"Fair" },
        { w:"75%",  bg:"#6366F1", t:"Good" },
        { w:"100%", bg:"#10B981", t:"Strong 💪" }
      ];
      bar.style.width      = map[score].w;
      bar.style.background = map[score].bg;
      lbl.textContent      = map[score].t;
    });

    // Form submit
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn     = document.getElementById("regBtn");
      const alertEl = document.getElementById("regAlert");
      const alertMsg= document.getElementById("regAlertMsg");
      alertEl.classList.add("d-none");

      const name  = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const pwd   = document.getElementById("regPassword").value;
      const conf  = document.getElementById("regConfirm").value;

      // Validation
      if (!name || !email || !pwd || !conf) {
        alertMsg.textContent = "Please fill in all fields.";
        alertEl.classList.remove("d-none"); return;
      }
      if (pwd.length < 6) {
        alertMsg.textContent = "Password must be at least 6 characters.";
        alertEl.classList.remove("d-none"); return;
      }
      if (pwd !== conf) {
        alertMsg.textContent = "Passwords don't match.";
        alertEl.classList.remove("d-none"); return;
      }

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Creating account…`;

      try {
        await registerUser(name, email, pwd);
        window.location.href = "dashboard.html";
      } catch (err) {
        const map = {
          "auth/email-already-in-use": "This email is already registered.",
          "auth/invalid-email":        "Please enter a valid email address.",
          "auth/weak-password":        "Password must be at least 6 characters.",
          "auth/operation-not-allowed":"Email/password sign-up is not enabled."
        };
        alertMsg.textContent = map[err.code] || "Registration failed. Please try again.";
        alertEl.classList.remove("d-none");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="bi bi-person-plus me-2"></i>Create Account`;
      }
    });
  </script>
</body>
</html>
